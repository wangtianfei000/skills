# 2026 年了，你还让 AI 用 Markdown 写技术文档？

——让 AI 用 ASCII 字符画架构图，可能是这个时代最大的程序员行为艺术

> 作者：程序员-王工 · 资深架构师 · 2026-05-20

---

## 开篇 · 痛点

先讲一件最近让我血压升高的事。

上周让 ChatGPT 帮我写一份《多智能体协作系统重构技术方案》，30 秒后它吐了一大段 Markdown 给我。整体看起来挺像样，可拉到「整体架构」那一节，我血压瞬间飙起来——**它给我画了这么一张「ASCII 架构图」**：

```
+----------------+       +-----------------+       +----------------+
|   Web 前端     | ----> |   API 网关       | ----> |   订单服务     |
+----------------+       +-----------------+       +----------------+
                              |        |
                              v        v
                        +---------+ +---------+
                        | 用户中心 | | 商品中心 |
                        +---------+ +---------+
```

我盯着这堆加号横线看了半分钟，差点把咖啡喷在屏幕上。**2026 年了，AI 还在用 1990 年代 BBS 论坛风的字符画给我画架构图。**

> 把 ASCII 架构图发给客户，对方会以为你穿越了。

我心想算了，让它换 Mermaid 总行了吧？于是补一句：「请用 Mermaid 重画。」AI 乖乖换了一段 `graph TD` 给我。

我一拷贝到客户的飞书文档里——**它原封不动地把 Mermaid 源码当成普通文字渲染了出来**，长这样：

```
graph TD
    A[Web前端] --> B[API网关]
    B --> C[订单服务]
    B --> D[用户中心]
    B --> E[商品中心]
```

客户那边发来一个微笑表情：「老王，这个图我看不太懂…」

最后一击是**界面原型**。我让 AI 设计一个「订单管理后台的列表页」，它给我返回了——

> 左侧为侧边导航栏（包含「首页」「订单」「商品」「设置」四项），顶部为搜索栏与用户头像，中间区域为订单列表表格，包含订单号、客户、金额、状态、操作五列…

一段干巴巴的文字描述。**我读完只想问：图呢？**

> Markdown 不是不行，是它根本扛不动「技术文档」这三个字。

那一刻我突然想通了：错的不是 AI，错的是我们让 AI 用 Markdown 这个 1991 年发明的纯文本格式，去承载 2026 年的「图文 + 图表 + 原型 + 高亮代码」。

这就是今天要聊的事——**该让 AI 换载体了**。

## 一、AI + Markdown 的三大灾难现场

把刚才那场翻车归类一下，AI 用 Markdown 写技术文档时，必然会撞上这三堵墙：

### 灾难一：ASCII 字符画架构图

Markdown 没有原生画图能力，AI 又被规定只能输出纯文本，结果就是——它会用 `+`、`-`、`|` 给你硬画。

**问题**：等宽字体下勉强能看，**非等宽字体或导出 PDF 后线条直接错位**；4 层以上的层级关系画不出来；多分支汇合彻底失控；客户拿到只会反问"这是不是乱码？"

### 灾难二：Mermaid 在大多数地方就是一坨源码

AI 学聪明了，给你写 Mermaid。可问题是——**Mermaid 不是 Markdown 的标准能力，只在 GitHub / GitLab / Typora 等少数地方会渲染**。你把它复制到下面这些地方，立刻原形毕露：

- 飞书文档 ❌
- 企业微信 ❌
- 钉钉 ❌
- 微信公众号 ❌
- Word ❌
- 语雀（默认）❌
- 大多数邮件 ❌
- 导出 PDF ❌

> 客户、产品经理、甲方爸爸 99% 都不在 GitHub 里看文档。你交付的 `graph TD` 在他们眼里就是一段长得像代码的废话。

### 灾难三：界面原型？MD 根本装不下

Markdown 的语法集里**压根没有「布局」这个概念**——没 flex、没 grid、没绝对定位、没颜色控制、没交互。AI 想给你画原型只剩两条路：

- **路 A：用文字描述**——「左侧导航栏，右侧表格…」客户全靠脑补，沟通成本爆炸。
- **路 B：让你打开 Figma**——AI 写完 MD，你还要手动画图，那 AI 给你省的时间又赔回去了。

> 三堵墙的根因只有一句话：Markdown 是为「读」设计的，不是为「展示技术系统」设计的。

## 二、解法：HTML 渲染 + Markdown 内容体（让 AI 只写 MD）

既然 Markdown 三堵墙都过不去，那问题来了——**能不能既让 AI 继续用 Markdown（它最擅长的格式），又能输出包含架构图、原型、代码高亮的完整文档？**

答案是：**HTML 渲染 + Markdown 内容体**。核心思路就两句话：

> AI 只需要写纯 Markdown，剩下的架构图渲染、代码高亮、界面原型、PDF 导出，全部交给 HTML 渲染在浏览器端自动完成。

| 角色 | 谁做 | 做什么 |
|---|---|---|
| Markdown 内容体 | **AI** | 纯 Markdown，放进 `<script type="text/markdown">` |
| HTML 渲染 | **模板（一次配置，永久复用）** | CDN 引入 + 内联 CSS + 渲染脚本 |
| 运行时渲染 | **marked.js** | 浏览器端 Markdown → HTML |
| 图表渲染 | **Mermaid** | ` ```mermaid ``` ` 代码块 → SVG |
| 代码高亮 | **Prism.js** | ` ```js ``` ` 围栏代码 → 语法着色 |

> 💡 **核心理念**：AI 输出 Markdown（0 学习成本），浏览器端完成所有重活。Markdown 放在文件第 4 行起，打开 `.html` 就能直接读正文——人机共读。

### 2.1 整体架构图

```mermaid
graph TD
    subgraph AI["🤖 AI 做的事"]
        MD["写纯 Markdown\n# 标题 / 段落 / 表格\n + ```mermaid 图表\n + ```js 代码块\n + 内联 HTML 原型"]
    end
    subgraph 渲染["📄 HTML 渲染（一次配置）"]
        SCRIPT["&lt;script type='text/markdown'&gt;\n Markdown 内容体"]
        CDN["CDN：marked.js / Mermaid / Prism"]
        CSS["内联最小化 CSS（~53 行）"]
        RENDER["渲染脚本：marked.parse + mermaid.run + Prism"]
    end
    subgraph 输出["🚀 交付"]
        BROWSER["浏览器双击预览"]
        PDF["一键导出 PDF"]
        GIT["Git diff 友好"]
    end
    MD --> SCRIPT
    SCRIPT --> RENDER
    CDN --> RENDER
    CSS --> RENDER
    RENDER --> BROWSER
    BROWSER --> PDF
    BROWSER --> GIT

    classDef ai fill:#fef3c7,stroke:#b45309,stroke-width:2px,color:#78350f
    classDef shell fill:#dbeafe,stroke:#1e40af,stroke-width:2px,color:#1e3a8a
    classDef out fill:#d1fae5,stroke:#047857,color:#064e3b
    class MD ai
    class SCRIPT,CDN,CSS,RENDER shell
    class BROWSER,PDF,GIT out
```

> 💡 **重点**：Markdown 内容放在文件最前面（`<head>` 内第 4 行起），打开文件即可看到正文，不用翻 HTML 渲染代码。所有渲染能力由模板一次性提供，AI 零负担。

## 三、同一份文档的三种命运

同一份 AI 生成的内容，用不同载体交付出去，命运截然不同：

```mermaid

    Choose -- Markdown 渲染 HTML --> HTML["AI 生成 Markdown\n（嵌入 &lt;script&gt; 渲染模板）"]

## 七、FAQ

**Q1：AI 真的能只写 Markdown 就能生成完整文档吗？**

能。GPT-4o / Claude Opus / Gemini 1.5 都能稳定输出纯 Markdown，包含 ` ```mermaid ``` ` 代码块、` ```js ``` ` 代码块，以及内联 HTML 原型。**本文的 Markdown 正文就是 AI 一次性生成的**，HTML 渲染模板是复用的。

**Q2：Markdown 内容怎么放进 HTML 渲染模板？**

把 AI 输出的 Markdown 直接粘贴进 `<script type="text/markdown" id="md-source">` 和 `<\/script>` 之间。注意把内容里的 `<\/script>` 改成 `&lt;\\/script&gt;`（渲染脚本会自动转义处理）。

**Q3：CDN 离线打不开怎么办？**

把 marked.js / Mermaid / Prism.js 三个文件下载到本地，把 `<script src>` 改成相对路径，一次配置永久离线。见 `SKILL.md` 的「输出要求」节。

**Q4：Mermaid 画不出复杂的多层架构图怎么办？**

简单图用 ` ```mermaid ``` `，多层等宽架构图直接在 Markdown 中写内联 HTML（`<div class="flex">` + `<div class="flex-1">`），内联 CSS 已覆盖边框、圆角、悬停样式，无需额外 Tailwind class。本文里的「订单后台原型」就是这样写的。

**Q5：客户的电脑没装浏览器怎么办？**

……如果 2026 年还有这种客户，建议你换工作。

<script>
(function(){
const e=document.getElementById('md-source');
let t=e.textContent;
t=t.replace(/<\/script/gi,'<\\/script');
marked.setOptions({breaks:true,gfm:true});
const r=new marked.Renderer();
r.code=function(e){
const t=typeof e==='string'?e:(e.text||e.raw||''),
o=typeof e==='string'?'':(e.lang||'');
if(o==='mermaid')return`<div class="mermaid-wrapper my-4 p-4 bg-gray-50 border border-gray-200 rounded-lg"><pre class="mermaid">${t}</pre></div>`;
const n=t.replace(/<\\\/script/gi,'<\/script'),
a=n.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
return`<pre class="language-${o||'plaintext'}"><code class="language-${o||'plaintext'}">${a}</code></pre>`
};
document.getElementById('content').innerHTML=marked.parse(t,{renderer:r});
mermaid.initialize({startOnLoad:false,theme:'neutral',flowchart:{useMaxWidth:true,curve:'basis'}});
setTimeout(()=>{
document.querySelectorAll('.mermaid-wrapper').forEach(e=>{
const t=e.querySelector('.mermaid');
t&&t.textContent.trim()&&mermaid.run({nodes:[t]}).catch(()=>{})
})
},200);
setTimeout(()=>{window.Prism&&Prism.highlightAll()},500)
})();
function exportToPDF(){
const e=document.getElementById('exportPdfBtn');
e&&(e.textContent='⏳ 准备中...',e.disabled=true);
const t=document.fonts&&document.fonts.ready||Promise.resolve();
t.then(()=>new Promise(r=>setTimeout(r,400))).then(()=>{
e&&(e.textContent='📄 保存PDF',e.disabled=false);
window.print()
})
}
</script>
